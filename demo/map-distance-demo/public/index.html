<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地图测距 Demo — 百度地图 BMapGL</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
      html, body, #root { height: 100%; }
    </style>
    <!--
      百度地图 JSAPI GL（WebGL v1.0）
      申请 ak: https://lbsyun.baidu.com/apiconsole/key
      Referer 白名单需包含当前开发端口（例如 http://localhost:3002/*）
      callback=initBMap：SDK 加载完成后会触发 window.initBMap 并派发 bmap-loaded 事件

      重要：百度地图 SDK 在 <head> 中加载会因 <body> 尚未解析而执行 appendChild(null) 报错，
      因此必须将 <script> 放置在 <body> 末尾、#root 之后。
    -->
    <script>
      // 全局加载状态标志位，供 React 端轮询/感知（避免一次性事件被错过）
      window.__BMAP_LOADED__ = false;
      window.initBMap = function () {
        var startedAt = Date.now();
        var tick = function () {
          if (window.BMapGL && typeof window.BMapGL.Map === 'function') {
            window.__BMAP_LOADED__ = true;
            try { window.dispatchEvent(new Event('bmap-loaded')); } catch (e) {}
            return;
          }
          if (Date.now() - startedAt > 15000) return;
          setTimeout(tick, 50);
        };
        tick();
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- 百度地图 SDK 必须放在 body 末尾 -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?type=webgl&v=1.0&ak=pV9jJMCCLHf3n0M8o18b4TWx2An5ce1d&callback=initBMap"></script>
  </body>
</html>
